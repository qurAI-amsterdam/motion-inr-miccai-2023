[training]
lr = 1e-05
optimizer = 'adam'
scheduler = True
batch_size = 10000
warpinn_init = True

[regularization]
raw_jacobian_regularization = True
jacobian_regularization = True
displacement_loss = False
alpha_jacobian = 0.05
early_stopping = True
background_weight = 0.0001

[image hyperparameters]
use_mask_loss = True
keep_3d_4ch = False
use_contour = False
reg_with_mask = True
use_shape_loss = False
omit_base_apex = True
omit_base_apex_perc = 0

[cycle consistency]
cycle_alpha = 0 # 1e-3 # if = 0 then no cycle consistency loss
cycle_loss_delay = 0
omega = 45

[network]
normalize_coords = True
layers = [3, 256, 256, 256, 3]
network_type = "SIREN"  # Options are "MLP" and "SIREN"

[hyperparameters]
hyper_regularization = False
bending_regularization = False

[input]
sax_aligned = False
in_xyz_shape = True
xyz_sequence = True
sr = False

[experiment]
description = New run, all timepoints, with multiple views now and sr
seed = 0
epochs = 3500
early_stop = 1
multiple_nets = 0
multi_view = 0 # 0: no, 1: yes
crop = True
all_timepoints = True
conver_to_engineering = True # I think not needed anymore with the new dvf in physical space
compute_physical_dvf = False # Experimental, keep in False

[general settings]
wandb_enabled = False
multiprocessing = True
debug = False
save_net = True
verbose = False
save = True

[paths]
root = ""
path_to_data = ""
path_to_data_lax = ""
path_to_segmentation = ""
path_to_segmentation_lax = ""
dataset = controls
dataset_arg = ""


experiment_folder_name = Experiment_test_cleaning_delete